<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Absensi Digital</title>

<style>
body {
  background: linear-gradient(135deg,#e3f2fd,#fff);
}
.card {
  border-radius: 20px;
}
video {
  width:100%;
  border-radius:15px;
  transform: scaleX(-1);
}
.logo {
  width:80px;
}
</style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="container">
<div class="row justify-content-center">
<div class="col-md-5">

<div class="card p-4 shadow">

<!-- LOGO -->
<div class="text-center mb-3">
  <img src="https://lh3.googleusercontent.com/d/1M02Nyk5fBwlo0qDTbbPEgZbFxJfUFpfY" class="logo mb-2">
  <h5 class="fw-bold mb-0">Fakultas Keperawatan</h5>
  <small class="text-muted">Universitas Riau</small>
</div>

<h6 class="text-center mb-3">Absensi Digital</h6>

<input id="nama" class="form-control my-2" placeholder="Nama Lengkap">
<input id="password" type="password" class="form-control my-2" placeholder="Password">

<select id="status" class="form-select my-2">
<option value="Masuk">Masuk</option>
<option value="Pulang">Pulang</option>
</select>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" class="d-none"></canvas>

<button id="btnAbsen" onclick="absen()" class="btn btn-primary w-100 mt-3">
Kirim Absen
</button>

<div id="msg" class="mt-3 text-center"></div>

</div>
</div>
</div>
</div>

<script>

// 🔴 GANTI JIKA BERUBAH
const url = "https://script.google.com/macros/s/AKfycbwxjlI9jM7PmjU9VO-osGQ_AGb1sjH1_rUweO6lZj-wYshDpl4MTgDG8xl57gB4KunF/exec";

// 📍 LOKASI
const lokasi = [
  { nama:"Kampus Panam", lat:0.469213, lon:101.3793428 },
  { nama:"Gobah", lat:0.5130534, lon:101.4562368 }
];

// 📷 AKTIFKAN KAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
})
.catch(() => {
  document.getElementById("msg").innerHTML =
    "<div class='alert alert-danger'>Kamera tidak diizinkan</div>";
});

// 📏 HITUNG JARAK
function jarak(a,b,c,d){
  const R=6371e3;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

// 🚀 ABSEN
function absen(){
  const msg = document.getElementById("msg");
  const btn = document.getElementById("btnAbsen");

  let nama = document.getElementById("nama").value;
  let password = document.getElementById("password").value;
  let status = document.getElementById("status").value;

  if(!nama || !password){
    msg.innerHTML = "<div class='alert alert-danger'>Isi data dulu</div>";
    return;
  }

  btn.disabled = true;
  msg.innerHTML = "<div class='alert alert-info'>Memproses...</div>";

  navigator.geolocation.getCurrentPosition(

    pos => {

      let lokasiValid = null;

      lokasi.forEach(l => {
        let d = jarak(pos.coords.latitude,pos.coords.longitude,l.lat,l.lon);
        if(d <= 100){
          lokasiValid = l.nama;
        }
      });

      if(!lokasiValid){
        msg.innerHTML = "<div class='alert alert-danger'>Di luar radius lokasi</div>";
        btn.disabled = false;
        return;
      }

      // 📸 FOTO
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video,0,0);

      let foto = canvas.toDataURL("image/jpeg",0.6);

      // 🔥 KIRIM DATA (ANTI ERROR)
fetch(url,{
  method:"POST",
  body: JSON.stringify({
    nama:nama,
    status:status,
    lat:pos.coords.latitude,
    lon:pos.coords.longitude
  })
})
.then(res => res.text())
.then(res => {
  console.log(res);
  document.getElementById("msg").innerHTML =
    "<div class='alert alert-success'>Terkirim</div>";
})
.catch(err => {
  console.log(err);
  document.getElementById("msg").innerHTML =
    "<div class='alert alert-danger'>Tidak terhubung</div>";
});
.catch(err=>{
  console.log(err);
  msg.innerHTML = "<div class='alert alert-danger'>Gagal koneksi (CORS/Deploy)</div>";
  btn.disabled = false;
});
.catch((err)=>{
  console.log(err);
  msg.innerHTML = "<div class='alert alert-danger'>Gagal koneksi (response tidak valid)</div>";
  btn.disabled = false;
});.catch(err=>{
  console.log(err);
  msg.innerHTML = "<div class='alert alert-danger'>Gagal koneksi (CORS/Deploy)</div>";
  btn.disabled = false;
});.catch((err)=>{
  console.log(err);
  msg.innerHTML = "<div class='alert alert-danger'>Gagal koneksi (response tidak valid)</div>";
  btn.disabled = false;
});
      .catch(()=>{
        msg.innerHTML = "<div class='alert alert-danger'>Gagal koneksi</div>";
        btn.disabled = false;
      });

    },

    () => {
      msg.innerHTML = "<div class='alert alert-danger'>GPS tidak diizinkan</div>";
      btn.disabled = false;
    }

  );
}

// 🔒 CEK SUDAH ABSEN HARI INI
let today = new Date().toLocaleDateString();

if(localStorage.getItem("absen_"+today)){
  document.getElementById("btnAbsen").disabled = true;
  document.getElementById("msg").innerHTML =
    "<div class='alert alert-warning'>Anda sudah absen hari ini</div>";
}

</script>

</body>
</html>
